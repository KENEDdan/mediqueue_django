<aside class="mq-sidebar">
  <div class="mq-sidebar-brand"><span class="mq-brand-icon">🏥</span><span class="mq-brand-text">MediQueue</span></div>
  <div class="mq-sidebar-user">
    <div class="mq-avatar">{{ request.user.first_name|first }}</div>
    <div>
      <div class="mq-sidebar-name">Dr. {{ request.user.full_name }}</div>
      <div class="mq-sidebar-role">{{ request.user.doctor.specialization.name }}</div>
    </div>
  </div>
  <nav class="mq-sidebar-nav">
    <a href="{% url 'doctor_dashboard' %}" class="mq-nav-item {% if request.resolver_match.url_name == 'doctor_dashboard' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="{% url 'doctor_appointments' %}" class="mq-nav-item {% if 'appointments' in request.resolver_match.url_name %}active{% endif %}">
      <i class="bi bi-calendar3"></i> My Appointments
    </a>
    <a href="{% url 'doctor_schedule' %}" class="mq-nav-item {% if 'schedule' in request.resolver_match.url_name %}active{% endif %}">
      <i class="bi bi-clock"></i> My Schedule
    </a>
    <a href="{% url 'doctor_blocked_dates' %}" class="mq-nav-item {% if 'blocked' in request.resolver_match.url_name %}active{% endif %}">
      <i class="bi bi-slash-circle"></i> Blocked Dates
    </a>
    <a href="{% url 'clinic_patient_records' %}" class="mq-nav-item">
      <i class="bi bi-file-medical"></i> Patient Records
    </a>
  </nav>
  <div class="mq-sidebar-footer">
    <a href="{% url 'logout' %}" class="mq-nav-item mq-nav-logout"><i class="bi bi-box-arrow-left"></i> Sign Out</a>
  </div>
</aside>
