{% load static %}
<aside class="mq-sidebar">
  <div class="mq-sidebar-brand">
    <span class="mq-brand-icon">🏥</span>
    <span class="mq-brand-text">MediQueue</span>
  </div>
  <div class="mq-sidebar-user">
    <div class="mq-avatar">{{ request.user.first_name|first }}{{ request.user.full_name.split|last|first }}</div>
    <div>
      <div class="mq-sidebar-name">{{ request.user.full_name }}</div>
      <div class="mq-sidebar-role">Super Admin</div>
    </div>
  </div>
  <nav class="mq-sidebar-nav">
    <a href="{% url 'superadmin:dashboard' %}" class="mq-nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="{% url 'superadmin:pending_clinics' %}" class="mq-nav-item {% if 'pending' in request.resolver_match.url_name %}active{% endif %}">
      <i class="bi bi-hourglass-split"></i> Pending Approvals
    </a>
    <a href="{% url 'superadmin:all_clinics' %}" class="mq-nav-item {% if 'all_clinics' in request.resolver_match.url_name %}active{% endif %}">
      <i class="bi bi-hospital"></i> All Clinics
    </a>
    <a href="{% url 'superadmin:all_users' %}" class="mq-nav-item {% if 'all_users' in request.resolver_match.url_name %}active{% endif %}">
      <i class="bi bi-people"></i> All Users
    </a>
    <a href="{% url 'superadmin:stats' %}" class="mq-nav-item {% if 'stats' in request.resolver_match.url_name %}active{% endif %}">
      <i class="bi bi-bar-chart"></i> Statistics
    </a>
    <a href="{% url 'superadmin_finance' %}" class="mq-nav-item {% if 'finance' in request.resolver_match.url_name %}active{% endif %}">
      <i class="bi bi-cash-stack"></i> Finance
    </a>
  </nav>
  <div class="mq-sidebar-footer">
    <a href="{% url 'logout' %}" class="mq-nav-item mq-nav-logout">
      <i class="bi bi-box-arrow-left"></i> Sign Out
    </a>
  </div>
</aside>
